<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Drinking Diary</title>
    <style>
        /* Essential Reset */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0d14;
            color: #e2e8f0;
            font-family: -apple-system, system-ui, sans-serif;
            padding: 20px 16px 100px;
            padding-top: env(safe-area-inset-top);
        }
        #app { max-width: 480px; margin: 0 auto; }
        
        /* UI Elements */
        .header { text-align: center; margin-bottom: 20px; }
        .title { font-size: 24px; margin-top: 10px; color: #fff; }
        
        .tabs { display: flex; background: rgba(255,255,255,0.05); border-radius: 12px; padding: 4px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: transparent; color: #666; border-radius: 8px; cursor: pointer; }
        .tab-btn.active { background: rgba(255,255,255,0.1); color: #fff; }

        .card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 15px; margin-bottom: 15px; }
        .label { font-size: 11px; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-bottom: 8px; display: block; }
        
        input[type=range] { width: 100%; margin: 10px 0; }
        textarea, input[type=date] { 
            width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px; padding: 12px; color: #fff; font-size: 16px; outline: none;
        }

        .quick-row { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
        .btn-small { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 8px; border-radius: 6px; font-size: 12px; flex: 1; }
        
        .save-btn { 
            width: 100%; padding: 18px; border: none; border-radius: 14px; 
            background: linear-gradient(135deg,#6366f1,#8b5cf6); color: white; 
            font-size: 18px; font-weight: bold; margin-top: 10px;
        }

        .history-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid rgba(255,255,255,0.05); }
        .unit-display { color: #818cf8; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">Loading...</div>

<script>
// --- DATA & STATE ---
var historyData = JSON.parse(localStorage.getItem('diary_v3') || '[]');
var currentTab = 'log'; // 'log' or 'history'
var formData = {
    date: new Date().toISOString().split('T')[0],
    drunkenness: 0,
    hangover: 0,
    units: 0,
    drinks: '',
    incidents: ''
};

// --- FUNCTIONS ---
function saveEntry() {
    historyData.unshift(JSON.parse(JSON.stringify(formData)));
    localStorage.setItem('diary_v3', JSON.stringify(historyData));
    
    // Reset form
    formData.units = 0;
    formData.drinks = '';
    formData.incidents = '';
    
    currentTab = 'history';
    render();
}

function addDrink(name, unitValue) {
    formData.units += unitValue;
    var sep = formData.drinks.length > 0 ? ", " : "";
    formData.drinks += sep + name;
    render();
}

function deleteEntry(index) {
    if(confirm("Delete this?")) {
        historyData.splice(index, 1);
        localStorage.setItem('diary_v3', JSON.stringify(historyData));
        render();
    }
}

// --- RENDERER ---
function render() {
    var app = document.getElementById('app');
    var html = '';

    // Header
    html += '<div class="header"><div>🥃</div><div class="title">The Drinking Diary</div></div>';

    // Tabs
    html += '<div class="tabs">';
    html += '<button class="tab-btn '+(currentTab=='log'?'active':'')+'" onclick="currentTab=\'log\';render()">📝 Log</button>';
    html += '<button class="tab-btn '+(currentTab=='history'?'active':'')+'" onclick="currentTab=\'history\';render()">📅 History ('+historyData.length+')</button>';
    html += '</div>';

    if (currentTab == 'log') {
        html += '<div class="card">';
        html += '<span class="label">Date</span>';
        html += '<input type="date" value="'+formData.date+'" onchange="formData.date=this.value">';
        html += '</div>';

        // Sliders
        html += '<div class="card">';
        html += '<span class="label">Drunkenness: '+formData.drunkenness+'</span>';
        html += '<input type="range" min="0" max="3" value="'+formData.drunkenness+'" oninput="formData.drunkenness=parseInt(this.value);render()">';
        html += '</div>';

        html += '<div class="card">';
        html += '<span class="label">Hangover: '+formData.hangover+'</span>';
        html += '<input type="range" min="0" max="3" value="'+formData.hangover+'" oninput="formData.hangover=parseInt(this.value);render()">';
        html += '</div>';

        // Units
        html += '<div class="card" style="border: 1px solid #6366f166">';
        html += '<div style="display:flex; justify-content:space-between; margin-bottom:10px;">';
        html += '<span class="label">Units & Drinks</span>';
        html += '<span class="unit-display">'+formData.units.toFixed(1)+' Units</span>';
        html += '</div>';
        
        html += '<div class="quick-row">';
        html += '<button class="btn-small" onclick="addDrink(\'Shot\', 1)">+ Shot</button>';
        html += '<button class="btn-small" onclick="addDrink(\'Wine\', 2.1)">+ Wine</button>';
        html += '<button class="btn-small" onclick="addDrink(\'Pint 4%\', 2.3)">+ Pt 4%</button>';
        html += '<button class="btn-small" onclick="addDrink(\'Pint 5%\', 2.8)">+ Pt 5%</button>';
        html += '</div>';

        html += '<textarea rows="3" placeholder="Click buttons or type here..." oninput="formData.drinks=this.value">'+formData.drinks+'</textarea>';
        html += '</div>';

        // Incidents
        html += '<div class="card">';
        html += '<span class="label">Incidents</span>';
        html += '<textarea rows="2" oninput="formData.incidents=this.value">'+formData.incidents+'</textarea>';
        html += '</div>';

        html += '<button class="save-btn" onclick="saveEntry()">Save Session</button>';

    } else {
        // History List
        if (historyData.length == 0) {
            html += '<div style="text-align:center; padding:40px; color:#666;">No logs yet.</div>';
        } else {
            for (var i = 0; i < historyData.length; i++) {
                var item = historyData[i];
                html += '<div class="history-item">';
                html += '<div style="display:flex; justify-content:space-between; margin-bottom:8px;">';
                html += '<strong>'+item.date+'</strong>';
                html += '<span class="unit-display">'+(item.units ? item.units.toFixed(1) : 0)+' Units</span>';
                html += '</div>';
                html += '<div style="font-size:13px; color:#aaa; margin-bottom:8px;">'+item.drinks+'</div>';
                if(item.incidents) html += '<div style="font-size:13px; color:#fca5a5;">⚠️ '+item.incidents+'</div>';
                html += '<button style="background:none; border:none; color:#ef4444; font-size:10px; margin-top:10px; text-decoration:underline;" onclick="deleteEntry('+i+')">Delete</button>';
                html += '</div>';
            }
        }
    }

    app.innerHTML = html;
}

// Start
render();
</script>

</body>
</html>
