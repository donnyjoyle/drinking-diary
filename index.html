<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>The Drinking Diary</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0a0d14;
            background-image: radial-gradient(ellipse at 20% 50%, #1a1025 0%, transparent 60%),
                              radial-gradient(ellipse at 80% 20%, #0d1a2e 0%, transparent 60%);
            min-height: 100vh; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            padding-top: env(safe-area-inset-top);
        }
        #app { max-width: 480px; margin: 0 auto; padding: 20px 16px 100px; }
        .page-title {
            font-family: 'Playfair Display', serif; font-size: 28px; font-weight: 700;
            background: linear-gradient(135deg, #e2e8f0, #94a3b8);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 9px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; }
        .metric-card { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 20px; margin-bottom: 16px; }
        .save-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; color: white; font-family: 'Playfair Display', serif; font-size: 18px; font-weight: bold; }
        input[type=date], textarea { width: 100%; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 12px; color: #e2e8f0; font-family: 'DM Mono', monospace; font-size: 16px; }
        .field-label { font-size: 11px; color: rgba(255,255,255,0.4); font-family: 'DM Mono', monospace; margin-bottom: 6px; text-transform: uppercase; }
        .history-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; margin-bottom: 10px; overflow: hidden; }
        .history-header { width: 100%; background: none; border: none; padding: 16px; display: flex; align-items: center; justify-content: space-between; color: inherit; }
        .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>
    <div id="app"></div>

<script>
const METRICS = [
  { id:"drunkenness",  label:"Drunkenness",   emoji:"🍺", levels:["Low","Moderate","High","V. High"], colors:["#4ade80","#facc15","#fb923c","#ef4444"] },
  { id:"embarrassment",label:"Embarrassment", emoji:"😳", levels:["None","Modest","Quite","Very"], colors:["#4ade80","#facc15","#fb923c","#ef4444"] },
  { id:"hangover",     label:"Hangover",      emoji:"🤕", levels:["None","Slight","Quite","Very"], colors:["#4ade80","#facc15","#fb923c","#ef4444"] },
  { id:"mental",       label:"Mental State",  emoji:"🧠", levels:["Fine","Low","Not Great","Depressed"], colors:["#4ade80","#a3e635","#fb923c","#8b5cf6"] }
];

const todayStr = () => new Date().toISOString().split('T')[0];
const defaultValues = () => ({ drunkenness:0, embarrassment:0, hangover:0, mental:0, drinks:"", incidents:"", note:"", date:todayStr() });

let state = {
  tab: "survey",
  values: defaultValues(),
  history: JSON.parse(localStorage.getItem("drinking_diary_v2") || "[]"),
  saved: false,
  expandedId: null
};

function el(tag, attrs, ...children) {
  const e = document.createElement(tag);
  if (attrs) {
    Object.keys(attrs).forEach(k => {
      if (k === "style" && typeof attrs[k] === "object") Object.assign(e.style, attrs[k]);
      else if (k === "className") e.className = attrs[k];
      else if (k.startsWith("on")) e.addEventListener(k.toLowerCase().substring(2), attrs[k]);
      else e[k] = attrs[k];
    });
  }
  children.flat().forEach(child => {
    if (child == null) return;
    e.appendChild(typeof child === "string" ? document.createTextNode(child) : child);
  });
  return e;
}

const setState = (patch) => { Object.assign(state, patch); render(); };

function render() {
  const root = document.getElementById("app");
  root.innerHTML = "";
  
  // Header
  root.appendChild(el("div", {style:{textAlign:"center", padding:"20px 0"}},
    el("div", {style:{fontSize:"32px"}}, "🥃"),
    el("h1", {className:"page-title"}, "The Drinking Diary")
  ));

  // Tabs
  const tabs = el("div", {style:{display:"flex", background:"rgba(255,255,255,0.05)", borderRadius:"12px", padding:"4px", marginBottom:"24px"}},
    ["survey", "history"].map(t => el("button", {
      className: "tab-btn",
      style: { background: state.tab === t ? "rgba(255,255,255,0.1)" : "transparent", color: state.tab === t ? "#fff" : "#666" },
      onclick: () => setState({tab: t})
    }, t === "survey" ? "📝 Log" : `📅 History (${state.history.length})`))
  );
  root.appendChild(tabs);

  if (state.tab === "survey") {
    root.appendChild(Survey());
  } else {
    root.appendChild(History());
  }
}

function Survey() {
  const container = el("div");

  // Date
  container.appendChild(el("div", {style:{marginBottom:"20px"}},
    el("div", {className:"field-label"}, "Session Date"),
    el("input", {type:"date", value:state.values.date, onchange: e => state.values.date = e.target.value})
  ));

  // Metrics
  METRICS.forEach(m => {
    const val = state.values[m.id];
    const color = m.colors[val];
    const card = el("div", {className:"metric-card", style:{borderLeft:`4px solid ${color}`}},
      el("div", {style:{display:"flex", justifyContent:"space-between", marginBottom:"15px"}},
        el("span", {}, `${m.emoji} ${m.label}`),
        el("span", {style:{color:color, fontWeight:"bold"}}, m.levels[val])
      ),
      el("input", {
        type:"range", min:0, max:3, value:val, 
        style:{width:"100%", accentColor:color},
        oninput: e => { state.values[m.id] = parseInt(e.target.value); render(); }
      })
    );
    container.appendChild(card);
  });

  // Text areas
  const fields = [
    {id:"drinks", label:"🍷 Drinks Log", placeholder:"What did you have?"},
    {id:"incidents", label:"😳 Incidents", placeholder:"Anything regrettable?"}
  ];
  
  fields.forEach(f => {
    container.appendChild(el("div", {style:{marginBottom:"16px"}},
      el("div", {className:"field-label"}, f.label),
      el("textarea", {
        placeholder: f.placeholder, 
        value: state.values[f.id],
        oninput: e => state.values[f.id] = e.target.value
      })
    ));
  });

  // Save Button
  container.appendChild(el("button", {
    className: "save-btn",
    style: { background: state.saved ? "#22c55e" : "linear-gradient(135deg,#6366f1,#8b5cf6)" },
    onclick: () => {
      const entry = {...state.values, id: Date.now()};
      const newHistory = [entry, ...state.history];
      localStorage.setItem("drinking_diary_v2", JSON.stringify(newHistory));
      setState({history: newHistory, saved: true, values: defaultValues()});
      setTimeout(() => setState({saved: false, tab: "history"}), 1000);
    }
  }, state.saved ? "✓ Saved!" : "Save Session"));

  return container;
}

function History() {
  if (state.history.length === 0) return el("div", {style:{textAlign:"center", padding:"40px"}}, "No logs yet.");
  
  const container = el("div");
  state.history.forEach(entry => {
    const isExpanded = state.expandedId === entry.id;
    const card = el("div", {className:"history-card"},
      el("button", {className:"history-header", onclick: () => setState({expandedId: isExpanded ? null : entry.id})},
        el("div", {style:{textAlign:"left"}}, 
           el("div", {style:{fontSize:"14px"}}, entry.date)
        ),
        el("div", {style:{display:"flex", gap:"4px"}}, 
          METRICS.map(m => el("div", {className:"dot", style:{background:m.colors[entry[m.id]]}}))
        )
      )
    );
    if (isExpanded) {
        const detail = el("div", {style:{padding:"15px", borderTop:"1px solid rgba(255,255,255,0.1)", fontSize:"14px"}},
            el("div", {style:{marginBottom:"10px", color:"#c4b5fd"}}, entry.drinks || "No drink log"),
            el("button", {
                style:{color:"#f87171", background:"none", border:"none", fontSize:"12px"},
                onclick: () => {
                    const filtered = state.history.filter(h => h.id !== entry.id);
                    localStorage.setItem("drinking_diary_v2", JSON.stringify(filtered));
                    setState({history: filtered});
                }
            }, "Delete Entry")
        );
        card.appendChild(detail);
    }
    container.appendChild(card);
  });
  return container;
}

render();
</script>
</body>
</html>
